# Sobrescribe el compose principal para publicar puertos en tu máquina (desarrollo local).
# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# Necesitas DATABASE_URL y REDIS_URL en el entorno o en un archivo .env junto al compose (MySQL/Redis externos).

services:
  backend:
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    ports:
      - "${FRONTEND_PORT:-8080}:80"
