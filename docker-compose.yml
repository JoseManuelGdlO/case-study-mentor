# Stack: API Node + SPA (nginx). MySQL y Redis son externos — configúralos con variables de entorno.
# Easy Panel: sin `ports` en backend/frontend — el panel enruta al puerto interno (backend 3001, frontend 80).
# Local con puertos en el host: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Obligatorio en el entorno (p. ej. Easy Panel):
#   DATABASE_URL  — MySQL remoto, ej. mysql://user:pass@host:3306/enarm_db
#   REDIS_URL     — Redis remoto, ej. redis://:pass@host:6379  (el backend usa Redis para refresh tokens y caché)
#   JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, CORS_ORIGIN (coma = varios orígenes), etc.
#   Pagos (opcionales): FRONTEND_URL (URL pública del sitio, ej. https://enarm.com.mx — necesaria para redirects Stripe/PayPal),
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET, PAYPAL_WEBHOOK_ID
#   Correo / recuperar contraseña (opcionales pero necesarios para olvidé contraseña en prod):
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM, SMTP_SECURE (true con puerto 465)
#   Compose sustituye ${SMTP_*} desde el .env en ESTA carpeta (raíz del repo), no desde backend/.env.
#   Copia las SMTP al .env raíz, o exporta las variables, o defínelas en el panel (Easy Panel, etc.).
#
# Proxy mismo origen: build del frontend con VITE_API_URL vacío; CORS_ORIGIN = URL pública.
# Orígenes separados: VITE_API_URL=https://api.tu-dominio.com y CORS_ORIGIN=https://app.tu-dominio.com
#
# Imágenes subidas (persistencia): el backend escribe en /app/uploads (UPLOAD_DIR=uploads).
# Por defecto se monta ./data/uploads (relativo al repo) para desarrollo.
# En el VPS: sudo mkdir -p /images y en .env junto a este compose define HOST_UPLOADS_BIND=/images

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-at-least-32-chars-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-refresh-secret-32-chars-minimum}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-000000000000-placeholder.apps.googleusercontent.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      UPLOAD_DIR: uploads
      FRONTEND_URL: ${FRONTEND_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    volumes:
      - ${HOST_UPLOADS_BIND:-./data/uploads}:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
